# Training Configuration File

data:
  data_dir: "data"
  
model:
  type: "resnet"  # Options: "cnn", "resnet", "mobilenet"
  pretrained: true
  freeze_backbone: true

training:
  batch_size: 32
  num_epochs: 30
  learning_rate: 0.0001
  optimizer: "adam"  # Options: "adam", "sgd"
  scheduler: "plateau"  # Options: "plateau", "step", null
  weight_decay: 0.0001
  num_workers: 4
  save_dir: "models/saved"

evaluation:
  threshold: 0.5
  metrics: ["accuracy", "precision", "recall", "f1_score", "roc_auc"]



